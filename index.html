<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Preview Images</title>
<style>
  :root{
    --purple:#4000FF;
    --purple-hover:#3200CC;
    --card-bg:#E8E4E4;
    --dropzone-bg:#FAFDFF;
    --dropzone-border:#E4EDF4;
    --dropzone-border-active:#4000FF;
    --dropzone-border-error:#E11D48;
    --line:#CFD6DD;
    --input-border:#F0F2F5;
    --gray-icon:#808792;
    --gray-text:#6E727A;
    --gray-text-2:#6B7987;
    --gray-text-3:#616972;
    --gray-placeholder:#808792;
    --cancel-border:#EAECEF;
    --error:#E11D48;
    --error-bg:#FDECEE;
    --success:#0F9D58;
    --success-bg:#E9F9EF;
  }

  * { box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:#ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Full-viewport wrapper that centers the card on every screen size */
  .frame{
    min-height:100vh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* ===== Modal card ===== */
  .card{
    position:relative;
    width:100%;
    max-width:405px;
    background:var(--card-bg);
    border-radius:12px;
    padding:20px 16px 16px;
  }

  .card-title{
    font-size:16px;
    font-weight:700;
    color:#000000;
    line-height:20px;
    padding-right:28px;
  }

  .close-btn{
    position:absolute;
    right:16px;
    top:17px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:rgba(128,135,146,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    border:none;
    padding:0;
  }
  .close-btn:hover{ background:rgba(128,135,146,0.2); }
  .close-btn svg{ width:11px; height:11px; }

  /* ===== Dropzone ===== */
  .dropzone{
    margin-top:20px;
    width:100%;
    min-height:110px;
    background:var(--dropzone-bg);
    border:1px dashed var(--dropzone-border);
    border-radius:5.5px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
    padding:16px;
    cursor:pointer;
    transition:border-color .15s ease, background-color .15s ease;
  }
  .dropzone.is-dragover{
    border-color:var(--dropzone-border-active);
    background:#F1EEFF;
  }
  .dropzone.has-error{
    border-color:var(--dropzone-border-error);
    background:var(--error-bg);
  }
  .dropzone.has-file{
    border-style:solid;
    border-color:var(--dropzone-border-active);
  }

  .dropzone .upload-icon{
    width:21px;
    height:21px;
    color:var(--gray-icon);
    flex-shrink:0;
  }

  .dropzone .main-text{
    font-size:13px;
    font-weight:600;
    color:#000000;
  }
  .dropzone .main-text a{
    color:var(--purple);
    text-decoration:none;
    font-weight:600;
  }

  .dropzone .sub-text{
    font-size:11px;
    color:var(--gray-text-3);
  }

  .dropzone .file-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:#ffffff;
    border:1px solid var(--dropzone-border-active);
    border-radius:6px;
    padding:8px 12px;
    font-size:12px;
    color:#000;
    max-width:100%;
  }
  .dropzone .file-chip span.file-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:220px;
  }
  .dropzone .file-chip button{
    border:none;
    background:none;
    cursor:pointer;
    color:var(--gray-icon);
    font-size:14px;
    line-height:1;
    padding:0;
    display:flex;
    align-items:center;
  }
  .dropzone .file-chip button:hover{ color:var(--error); }

  .field-error{
    display:none;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:var(--error);
    margin-top:8px;
    text-align:left;
    width:100%;
  }
  .field-error.is-visible{ display:flex; }
  .field-error svg{ flex-shrink:0; width:12px; height:12px; }

  /* ===== OR divider ===== */
  .divider{
    margin-top:20px;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .divider .line{
    flex:1;
    height:1px;
    background:var(--line);
  }
  .divider .or-text{
    padding:0 10px;
    font-size:10px;
    letter-spacing:0.02em;
    color:var(--gray-text);
    white-space:nowrap;
  }

  /* ===== Import from URL ===== */
  .url-label{
    margin-top:14px;
    font-size:13px;
    font-weight:600;
    color:#000000;
  }

  .url-box{
    margin-top:10px;
    width:100%;
    min-height:48px;
    background:#ffffff;
    border:1px solid var(--input-border);
    border-radius:5.5px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:0 16px;
    transition:border-color .15s ease;
  }
  .url-box.has-error{ border-color:var(--dropzone-border-error); background:var(--error-bg); }
  .url-box.has-value{ border-color:var(--dropzone-border-active); }

  .url-box input[type="text"]{
    flex:1;
    min-width:0;
    border:none;
    outline:none;
    background:transparent;
    font-size:13px;
    color:#000;
    font-family:inherit;
    padding:0;
    height:46px;
  }
  .url-box input[type="text"]::placeholder{ color:var(--gray-placeholder); }

  .url-box .upload-link{
    font-size:13px;
    color:var(--purple);
    cursor:pointer;
    flex-shrink:0;
    background:none;
    border:none;
    font-family:inherit;
    font-weight:600;
    padding:0;
  }
  .url-box .upload-link:hover{ color:var(--purple-hover); }
  .url-box .upload-link:disabled{ color:var(--gray-icon); cursor:not-allowed; }

  /* ===== Banner (required / success) ===== */
  .banner{
    display:none;
    align-items:center;
    gap:8px;
    font-size:12px;
    padding:10px 12px;
    border-radius:6px;
    margin-top:14px;
  }
  .banner.is-visible{ display:flex; }
  .banner.banner-error{ background:var(--error-bg); color:var(--error); }
  .banner.banner-success{ background:var(--success-bg); color:var(--success); }
  .banner svg{ flex-shrink:0; width:14px; height:14px; }

  /* ===== Footer row ===== */
  .footer{
    margin-top:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }

  /* ===== Help center chip ===== */
  .help-chip{
    height:21px;
    padding:0 10px;
    background:#ffffff;
    border-radius:4px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    cursor:pointer;
    white-space:nowrap;
    border:none;
  }
  .help-chip svg{ width:15px; height:14px; color:#616972; flex-shrink:0; }
  .help-chip span{
    font-size:12px;
    color:#616972;
  }

  /* ===== Buttons ===== */
  .footer-actions{
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:auto;
  }

  .cancel-btn{
    height:39px;
    padding:0 20px;
    background:#ffffff;
    border:1px solid var(--cancel-border);
    border-radius:3.5px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:600;
    color:var(--gray-text-2);
    cursor:pointer;
    white-space:nowrap;
  }
  .cancel-btn:hover{ background:#F7F7F8; }

  .import-btn{
    height:40px;
    padding:0 20px;
    background:var(--purple);
    border:none;
    border-radius:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:700;
    color:#ffffff;
    cursor:pointer;
    white-space:nowrap;
  }
  .import-btn:hover{ background:var(--purple-hover); }

  .visually-hidden{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }

  /* ===== Small screens ===== */
  @media (max-width: 480px){
    .frame{ padding:16px; }
    .card{ padding:18px 14px 14px; }
    .footer{
      flex-direction:column;
      align-items:stretch;
      margin-top:20px;
    }
    .help-chip{ align-self:flex-start; }
    .footer-actions{
      margin-left:0;
      width:100%;
    }
    .cancel-btn, .import-btn{ flex:1; }
  }
</style>
</head>
<body>

<div class="frame" id="preview-images-frame" data-testid="preview-images-frame" data-qa="preview-images-frame">
  <div class="card" id="preview-images-card" data-testid="preview-images-card" data-qa="preview-images-card" role="dialog" aria-modal="true" aria-labelledby="preview-images-title">

    <div class="card-title" id="preview-images-title" data-testid="preview-images-title" data-qa="preview-images-title">Add Preview Images!</div>

    <button class="close-btn" id="preview-images-close-btn" data-testid="preview-images-close-btn" data-qa="preview-images-close-btn" type="button" aria-label="Close">
      <svg id="preview-images-close-icon" data-testid="preview-images-close-icon" data-qa="preview-images-close-icon" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L7 7M7 1L1 7" stroke="#808792" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="dropzone" id="preview-images-dropzone" data-testid="preview-images-dropzone" data-qa="preview-images-dropzone" tabindex="0" role="button" aria-label="Drag and drop or choose a file to upload">
      <input type="file" id="preview-images-file-input" data-testid="preview-images-file-input" data-qa="preview-images-file-input" class="visually-hidden" accept=".fig,.zip,.pdf,.png,.jpeg,.jpg" />

      <div id="preview-images-dropzone-default" data-testid="preview-images-dropzone-default" data-qa="preview-images-dropzone-default">
        <svg class="upload-icon" id="preview-images-dropzone-icon" data-testid="preview-images-dropzone-icon" data-qa="preview-images-dropzone-icon" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.5 15V9L5.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7.5 9L9.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.5 8V13C20.5 18 18.5 20 13.5 20H7.5C2.5 20 0.5 18 0.5 13V7C0.5 2 2.5 0 7.5 0H12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.5 8H16.5C13.5 8 12.5 7 12.5 4V0L20.5 8Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="main-text" id="preview-images-dropzone-main-text" data-testid="preview-images-dropzone-main-text" data-qa="preview-images-dropzone-main-text">Drag &amp; Drop or <a href="#" id="preview-images-choose-file-link" data-testid="preview-images-choose-file-link" data-qa="preview-images-choose-file-link">Choose file</a> to upload</div>
        <div class="sub-text" id="preview-images-dropzone-sub-text" data-testid="preview-images-dropzone-sub-text" data-qa="preview-images-dropzone-sub-text">fig, zip, pdf, png, jpeg</div>
      </div>

      <div class="file-chip" id="preview-images-file-chip" data-testid="preview-images-file-chip" data-qa="preview-images-file-chip" style="display:none;">
        <span class="file-name" id="preview-images-file-name" data-testid="preview-images-file-name" data-qa="preview-images-file-name"></span>
        <button type="button" id="preview-images-file-remove-btn" data-testid="preview-images-file-remove-btn" data-qa="preview-images-file-remove-btn" aria-label="Remove file">&times;</button>
      </div>
    </div>

    <div class="field-error" id="preview-images-dropzone-error" data-testid="preview-images-dropzone-error" data-qa="preview-images-dropzone-error" role="alert">
      <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5V6.5" stroke="currentColor" stroke-linecap="round"/><circle cx="6" cy="8.5" r="0.6" fill="currentColor"/></svg>
      <span id="preview-images-dropzone-error-text" data-testid="preview-images-dropzone-error-text" data-qa="preview-images-dropzone-error-text"></span>
    </div>

    <div class="divider" id="preview-images-divider" data-testid="preview-images-divider" data-qa="preview-images-divider">
      <span class="line" id="preview-images-divider-line-left" data-testid="preview-images-divider-line-left" data-qa="preview-images-divider-line-left"></span>
      <span class="or-text" id="preview-images-divider-or-text" data-testid="preview-images-divider-or-text" data-qa="preview-images-divider-or-text">OR</span>
      <span class="line" id="preview-images-divider-line-right" data-testid="preview-images-divider-line-right" data-qa="preview-images-divider-line-right"></span>
    </div>

    <label class="url-label" id="preview-images-url-label" for="preview-images-url-input" data-testid="preview-images-url-label" data-qa="preview-images-url-label">Import from URL</label>

    <div class="url-box" id="preview-images-url-box" data-testid="preview-images-url-box" data-qa="preview-images-url-box">
      <input type="text" id="preview-images-url-input" data-testid="preview-images-url-input" data-qa="preview-images-url-input" class="placeholder" placeholder="Add file URL" inputmode="url" autocomplete="off" />
      <button type="button" class="upload-link" id="preview-images-url-upload-btn" data-testid="preview-images-url-upload-btn" data-qa="preview-images-url-upload-btn">Upload</button>
    </div>

    <div class="field-error" id="preview-images-url-error" data-testid="preview-images-url-error" data-qa="preview-images-url-error" role="alert">
      <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="6" r="5.5" stroke="currentColor"/><path d="M6 3.5V6.5" stroke="currentColor" stroke-linecap="round"/><circle cx="6" cy="8.5" r="0.6" fill="currentColor"/></svg>
      <span id="preview-images-url-error-text" data-testid="preview-images-url-error-text" data-qa="preview-images-url-error-text"></span>
    </div>

    <div class="banner" id="preview-images-banner" data-testid="preview-images-banner" data-qa="preview-images-banner" role="status">
      <svg id="preview-images-banner-icon" data-testid="preview-images-banner-icon" data-qa="preview-images-banner-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="7" cy="7" r="6.5" stroke="currentColor"/></svg>
      <span id="preview-images-banner-text" data-testid="preview-images-banner-text" data-qa="preview-images-banner-text"></span>
    </div>

    <div class="footer" id="preview-images-footer" data-testid="preview-images-footer" data-qa="preview-images-footer">
      <button type="button" class="help-chip" id="preview-images-help-center-btn" data-testid="preview-images-help-center-btn" data-qa="preview-images-help-center-btn">
        <svg id="preview-images-help-center-icon" data-testid="preview-images-help-center-icon" data-qa="preview-images-help-center-icon" viewBox="0 0 15 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7.5" cy="7" r="6.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M6 5.5C6 4.7 6.7 4 7.5 4C8.3 4 9 4.7 9 5.5C9 6.2 8.4 6.5 8.1 6.7C7.8 6.9 7.5 7 7.5 7.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="7.5" cy="9.3" r="0.4" fill="currentColor"/>
        </svg>
        <span id="preview-images-help-center-text" data-testid="preview-images-help-center-text" data-qa="preview-images-help-center-text">Help Center</span>
      </button>

      <div class="footer-actions" id="preview-images-footer-actions" data-testid="preview-images-footer-actions" data-qa="preview-images-footer-actions">
        <button type="button" class="cancel-btn" id="preview-images-cancel-btn" data-testid="preview-images-cancel-btn" data-qa="preview-images-cancel-btn">Cancel</button>
        <button type="button" class="import-btn" id="preview-images-import-btn" data-testid="preview-images-import-btn" data-qa="preview-images-import-btn">Import</button>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  var ALLOWED_EXTENSIONS = ["fig", "zip", "pdf", "png", "jpeg", "jpg"];
  var ALLOWED_LABEL = "fig, zip, pdf, png, jpeg";

  var dropzone = document.getElementById("preview-images-dropzone");
  var fileInput = document.getElementById("preview-images-file-input");
  var dropzoneDefault = document.getElementById("preview-images-dropzone-default");
  var fileChip = document.getElementById("preview-images-file-chip");
  var fileNameEl = document.getElementById("preview-images-file-name");
  var fileRemoveBtn = document.getElementById("preview-images-file-remove-btn");
  var chooseFileLink = document.getElementById("preview-images-choose-file-link");
  var dropzoneError = document.getElementById("preview-images-dropzone-error");
  var dropzoneErrorText = document.getElementById("preview-images-dropzone-error-text");

  var urlBox = document.getElementById("preview-images-url-box");
  var urlInput = document.getElementById("preview-images-url-input");
  var urlUploadBtn = document.getElementById("preview-images-url-upload-btn");
  var urlError = document.getElementById("preview-images-url-error");
  var urlErrorText = document.getElementById("preview-images-url-error-text");

  var banner = document.getElementById("preview-images-banner");
  var bannerText = document.getElementById("preview-images-banner-text");

  var cancelBtn = document.getElementById("preview-images-cancel-btn");
  var importBtn = document.getElementById("preview-images-import-btn");
  var closeBtn = document.getElementById("preview-images-close-btn");

  var state = {
    selectedFile: null,
    confirmedUrl: null
  };

  function getExtension(filename){
    var parts = filename.split(".");
    return parts.length > 1 ? parts.pop().toLowerCase() : "";
  }

  function hideDropzoneError(){
    dropzoneError.classList.remove("is-visible");
    dropzoneErrorText.textContent = "";
    dropzone.classList.remove("has-error");
  }

  function showDropzoneError(message){
    dropzoneErrorText.textContent = message;
    dropzoneError.classList.add("is-visible");
    dropzone.classList.add("has-error");
    dropzone.classList.remove("has-file");
  }

  function hideUrlError(){
    urlError.classList.remove("is-visible");
    urlErrorText.textContent = "";
    urlBox.classList.remove("has-error");
  }

  function showUrlError(message){
    urlErrorText.textContent = message;
    urlError.classList.add("is-visible");
    urlBox.classList.add("has-error");
    urlBox.classList.remove("has-value");
  }

  function hideBanner(){
    banner.classList.remove("is-visible", "banner-error", "banner-success");
    bannerText.textContent = "";
  }

  function showBanner(type, message){
    banner.classList.remove("banner-error", "banner-success");
    banner.classList.add("is-visible", type === "success" ? "banner-success" : "banner-error");
    bannerText.textContent = message;
  }

  function clearFileSelection(){
    state.selectedFile = null;
    fileInput.value = "";
    fileChip.style.display = "none";
    dropzoneDefault.style.display = "flex";
    fileNameEl.textContent = "";
    dropzone.classList.remove("has-file");
  }

  function selectFile(file){
    var ext = getExtension(file.name);
    if (ALLOWED_EXTENSIONS.indexOf(ext) === -1) {
      clearFileSelection();
      showDropzoneError("Unsupported file format. Please upload " + ALLOWED_LABEL + " files only.");
      return;
    }
    hideDropzoneError();
    hideBanner();
    // File and URL are mutually exclusive
    clearUrlSelection();
    state.selectedFile = file;
    fileNameEl.textContent = file.name;
    dropzoneDefault.style.display = "none";
    fileChip.style.display = "flex";
    dropzone.classList.add("has-file");
  }

  function clearUrlSelection(){
    state.confirmedUrl = null;
    urlBox.classList.remove("has-value");
  }

  function isValidUrl(value){
    try {
      var url = new URL(value);
      return (url.protocol === "http:" || url.protocol === "https:") && !!url.hostname;
    } catch (e) {
      return false;
    }
  }

  function handleUrlConfirm(){
    var value = urlInput.value.trim();
    if (!value) {
      showUrlError("Please enter a URL.");
      return;
    }
    if (!isValidUrl(value)) {
      showUrlError("Invalid URL");
      return;
    }
    hideUrlError();
    hideBanner();
    // File and URL are mutually exclusive
    clearFileSelection();
    hideDropzoneError();
    state.confirmedUrl = value;
    urlBox.classList.add("has-value");
  }

  /* ---------- Dropzone interactions ---------- */

  dropzone.addEventListener("click", function(){
    fileInput.click();
  });

  dropzone.addEventListener("keydown", function(e){
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      fileInput.click();
    }
  });

  chooseFileLink.addEventListener("click", function(e){
    e.preventDefault();
    e.stopPropagation();
    fileInput.click();
  });

  fileInput.addEventListener("change", function(){
    if (fileInput.files && fileInput.files.length > 0) {
      selectFile(fileInput.files[0]);
    }
  });

  fileRemoveBtn.addEventListener("click", function(e){
    e.stopPropagation();
    clearFileSelection();
    hideDropzoneError();
  });

  ["dragenter", "dragover"].forEach(function(evtName){
    dropzone.addEventListener(evtName, function(e){
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.add("is-dragover");
    });
  });

  ["dragleave", "dragend"].forEach(function(evtName){
    dropzone.addEventListener(evtName, function(e){
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove("is-dragover");
    });
  });

  dropzone.addEventListener("drop", function(e){
    e.preventDefault();
    e.stopPropagation();
    dropzone.classList.remove("is-dragover");
    var files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length > 0) {
      selectFile(files[0]);
    }
  });

  /* ---------- URL interactions ---------- */

  urlUploadBtn.addEventListener("click", handleUrlConfirm);

  urlInput.addEventListener("keydown", function(e){
    if (e.key === "Enter") {
      e.preventDefault();
      handleUrlConfirm();
    }
  });

  urlInput.addEventListener("input", function(){
    if (urlError.classList.contains("is-visible")) {
      hideUrlError();
    }
  });

  /* ---------- Footer actions ---------- */

  importBtn.addEventListener("click", function(){
    if (!state.selectedFile && !state.confirmedUrl) {
      showBanner("error", "Please upload a file or import a URL before continuing.");
      return;
    }
    var source = state.selectedFile ? state.selectedFile.name : state.confirmedUrl;
    showBanner("success", "Imported successfully: " + source);
  });

  cancelBtn.addEventListener("click", function(){
    clearFileSelection();
    clearUrlSelection();
    hideDropzoneError();
    hideUrlError();
    hideBanner();
    urlInput.value = "";
  });

  closeBtn.addEventListener("click", function(){
    clearFileSelection();
    clearUrlSelection();
    hideDropzoneError();
    hideUrlError();
    hideBanner();
    urlInput.value = "";
  });

})();
</script>

</body>
</html>
